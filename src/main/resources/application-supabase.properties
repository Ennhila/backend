# Perfil: Supabase (PostgreSQL en la nube).
# Arranque: SPRING_PROFILES_ACTIVE=supabase
# Obligatorio: SUPABASE_DB_PASSWORD (salvo que la contraseña vaya dentro de SUPABASE_JDBC_URL).
#
# El host db.PROJECT.supabase.co a veces solo tiene IPv6; si ves UnknownHostException, usa una de:
# - Arrancar con: -Djava.net.preferIPv6Addresses=true (si tu red tiene IPv6 funcional)
# - O define SUPABASE_JDBC_URL con la cadena "Session pooler" del panel (suele tener IPv4): host tipo aws-0-*.pooler.supabase.com:5432 y usuario postgres.PROJECT_REF
#
# Si defines SUPABASE_JDBC_URL, ignora host/puerto/base inferiores para la URL.

spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.fnvbgsoaydqnqwkzzjrs
spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.changeLog=classpath:db/changelog/db.changelog-master.xml

spring.h2.console.enabled=false
