spring.application.name=backend

# H2 en memoria: desarrollo y tests.
# Supabase / PostgreSQL: SPRING_PROFILES_ACTIVE=supabase y variables en application-supabase.properties (ver env.supabase.example).
spring.datasource.url=jdbc:h2:mem:ldh;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.liquibase.changeLog=classpath:db/changelog/db.changelog-master.xml

# Consola H2 opcional: http://localhost:8080/h2-console (requiere exponer el bean en seguridad)
spring.h2.console.enabled=true

# JWT (cambiar secret en producción; mínimo 256 bits para HS256)
app.jwt.secret=${APP_JWT_SECRET:ldh-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha-256-algorithm-security}
app.jwt.expiration-ms=86400000

# Geocodificación de oficinas (Nominatim). Desactivar en entornos sin salida a Internet.
ldh.geocoding.enabled=true
ldh.geocoding.user-agent=LDH-Backend/1.0 (internal; admin geocoding)

# Asistente IA (Groq). Definir GROQ_API_KEY en el entorno; no commitear claves.
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
